<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pusulabet Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Segoe UI',sans-serif;overflow-x:hidden;padding:10px 8px;user-select:none;}
.header{width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;padding:6px 4px;margin-bottom:8px;}
.title{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 0 20px #f59e0b;}
.title span{color:#f59e0b;}
.stats{display:flex;gap:10px;}
.stat{text-align:center;background:rgba(255,255,255,0.05);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:4px 10px;min-width:54px;}
.stat-val{font-size:17px;font-weight:800;color:#f59e0b;}
.stat-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}
.timer-stat.warning .stat-val{color:#ef4444!important;animation:blink .5s ease infinite alternate;}
@keyframes blink{from{opacity:1}to{opacity:.3}}
.puzzle-board{width:100%;max-width:500px;aspect-ratio:4/3;border:2px solid rgba(245,158,11,0.4);border-radius:12px;overflow:hidden;background:#111827;box-shadow:0 0 30px rgba(245,158,11,0.15);}
.board-grid{width:100%;height:100%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:2px;padding:2px;}
.cell{border-radius:4px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.12);overflow:hidden;position:relative;}
.cell.drag-over{background:rgba(245,158,11,0.2)!important;border:2px solid #f59e0b!important;}
.cell canvas{width:100%;height:100%;display:block;border-radius:3px;}
.progress-bar{width:100%;max-width:500px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin:7px 0 5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:3px;transition:width .3s;width:0%;}
.tray-label{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.pieces-tray{width:100%;max-width:500px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:12px;min-height:60px;}
.piece{aspect-ratio:1;border-radius:5px;cursor:grab;border:2px solid rgba(245,158,11,0.5);touch-action:none;position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s;}
.piece::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 50%);border-radius:4px;pointer-events:none;z-index:1;}
.piece:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(245,158,11,0.45);border-color:#f59e0b;}
.piece.dragging{opacity:.45;transform:scale(.94);cursor:grabbing;}
.piece canvas{width:100%;height:100%;display:block;}
.overlay{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.overlay.show{display:flex;}
.win-box{background:linear-gradient(160deg,#0f172a,#1e293b);border:2px solid #f59e0b;border-radius:20px;padding:28px 24px;max-width:320px;width:90%;text-align:center;box-shadow:0 0 60px rgba(245,158,11,0.3);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards;}
.bomb-box{background:linear-gradient(160deg,#1a0000,#2d0000);border:2px solid #ef4444;border-radius:20px;padding:28px 24px;max-width:320px;width:90%;text-align:center;box-shadow:0 0 60px rgba(239,68,68,0.5);animation:shake .5s ease,popIn .3s forwards;}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-2deg)}40%{transform:translateX(10px) rotate(2deg)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.win-emoji,.bomb-emoji{font-size:56px;margin-bottom:10px;display:block;animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-10px) rotate(5deg)}}
.win-title{font-size:26px;font-weight:900;color:#f59e0b;margin-bottom:6px;text-shadow:0 0 20px #f59e0b;}
.win-subtitle{font-size:13px;color:#94a3b8;margin-bottom:16px;line-height:1.5;}
.bomb-title{font-size:22px;font-weight:900;color:#ef4444;margin-bottom:10px;}
.bomb-msg{font-size:14px;color:#fca5a5;margin-bottom:8px;line-height:1.6;font-weight:600;}
.bomb-channel{font-size:15px;color:#f59e0b;font-weight:800;}
.restart-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:12px;color:white;font-size:15px;font-weight:800;padding:13px 30px;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,0.4);width:100%;}
.retry-btn{background:linear-gradient(135deg,#ef4444,#dc2626);border:none;border-radius:12px;color:white;font-size:15px;font-weight:800;padding:13px 30px;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,0.4);width:100%;margin-top:16px;}
.restart-btn:active,.retry-btn:active{transform:scale(.96);}
.flash-red{position:fixed;inset:0;z-index:250;background:rgba(239,68,68,0.5);pointer-events:none;animation:flashOut .8s ease forwards;}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
#loading{position:fixed;inset:0;background:#0a0e1a;display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px;}
#loading p{color:#f59e0b;font-size:16px;font-weight:700;}
.loader{width:40px;height:40px;border:3px solid rgba(245,158,11,0.2);border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="loader"></div><p>Yükleniyor...</p></div>

<div class="header">
  <div class="title">Pusula<span>bet</span></div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="moveCount">0</div><div class="stat-lbl">Hamle</div></div>
    <div class="stat timer-stat" id="timerStat"><div class="stat-val" id="timerVal">3:00</div><div class="stat-lbl">Süre</div></div>
  </div>
</div>

<div class="puzzle-board"><div class="board-grid" id="boardGrid"></div></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="tray-label">Parçaları sürükle → puzzle'a yerleştir</div>
<div class="pieces-tray" id="piecesTray"></div>

<div class="overlay" id="winOverlay" style="background:rgba(0,0,0,0.85);">
  <div class="win-box">
    <span class="win-emoji">🎉</span>
    <div class="win-title">TEBRİKLER!</div>
    <div class="win-subtitle" id="winStats">Tamamladın!</div>
    <button class="restart-btn" onclick="restartGame()">🔄 Tekrar Oyna</button>
  </div>
</div>

<div class="overlay" id="bombOverlay" style="background:rgba(0,0,0,0.92);">
  <div class="bomb-box">
    <span class="bomb-emoji">💣</span>
    <div class="bomb-title">MAALESEF OLMADI!</div>
    <div class="bomb-msg">Süren doldu ve bomba patladı! 💥</div>
    <div class="bomb-channel">TEKRAR DENEMEK İÇİN<br>@pusulasocial kanalını takipte kal!</div>
    <button class="retry-btn" onclick="restartGame()">🔄 Tekrar Dene</button>
  </div>
</div>

const sourceImg = new Image();
sourceImg.onload = function() {
  sliceImage();
  document.getElementById('loading').style.display = 'none';
  init();
};
sourceImg.onerror = function() {
  document.getElementById('loading').innerHTML = '<p style="color:red">Görsel yüklenemedi!</p>';
};
sourceImg.src = IMG_DATA;

function sliceImage() {
  for (let i = 0; i < GRID; i++) {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    const sw = sourceImg.naturalWidth  / COLS;
    const sh = sourceImg.naturalHeight / ROWS;
    const cw = 200; // canvas width per piece
    const ch = Math.round(200 * (sh / sw)); // orantılı yükseklik
    const c = document.createElement('canvas');
    c.width = cw; c.height = ch;
    const ctx = c.getContext('2d');
    ctx.drawImage(sourceImg, col*sw, row*sh, sw, sh, 0, 0, cw, ch);
    pieceCanvases[i] = c;
  }
}

function init() {
  const order = Array.from({length:GRID*GRID},(_,i)=>i);
  shuffle(order);
  pieces = order.map((correctIdx, i) => ({id:i, correctIdx, placed:false}));
  boardState = Array(GRID*GRID).fill(null);
  moves=0; placedCount=0; gameOver=false; secondsLeft=TOTAL_SECONDS;
  document.getElementById('moveCount').textContent='0';
  document.getElementById('timerVal').textContent='3:00';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('timerStat').classList.remove('warning');
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('bombOverlay').classList.remove('show');
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
  renderBoard();
  renderTray();
}

function tick() {
  if(gameOver) return;
  secondsLeft--;
  const m=Math.floor(secondsLeft/60), s=secondsLeft%60;
  document.getElementById('timerVal').textContent = m+':'+String(s).padStart(2,'0');
  if(secondsLeft<=30) document.getElementById('timerStat').classList.add('warning');
  if(secondsLeft<=0){clearInterval(timerInterval);triggerBomb();}
}

function triggerBomb() {
  gameOver=true;
  const f=document.createElement('div');
  f.className='flash-red';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),900);
  setTimeout(()=>document.getElementById('bombOverlay').classList.add('show'),500);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function renderBoard() {
  const grid = document.getElementById('boardGrid');
  grid.innerHTML='';
  for(let i=0;i<GRID*GRID;i++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.idx=i;
    if(boardState[i]!==null){
      const p=pieces[boardState[i]];
      const cv=pieceCanvases[p.correctIdx].cloneNode();
      const ctx=cv.getContext('2d');
      ctx.drawImage(pieceCanvases[p.correctIdx],0,0);
      cell.appendChild(cv);
      cell.style.border='none';
    }
    cell.addEventListener('dragover',e=>{e.preventDefault();if(boardState[i]===null)cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drag-over');handleDrop(i);});
    grid.appendChild(cell);
  }
}

function renderTray(){
  const tray=document.getElementById('piecesTray');
  tray.innerHTML='';
  pieces.forEach((p,i)=>{
    if(p.placed) return;
    const el=document.createElement('div');
    el.className='piece';
    el.draggable=true;
    el.dataset.pid=i;
    // Clone canvas for display
    const srcCanvas = pieceCanvases[p.correctIdx];
    const cv=document.createElement('canvas');
    cv.width=srcCanvas.width;
    cv.height=srcCanvas.height;
    cv.getContext('2d').drawImage(srcCanvas,0,0);
    el.appendChild(cv);
    el.addEventListener('dragstart',e=>{
      dragPiece=i;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',i);
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragPiece=null;});
    el.addEventListener('touchstart',e=>touchStart(e,i),{passive:false});
    el.addEventListener('touchmove',touchMove,{passive:false});
    el.addEventListener('touchend',touchEnd,{passive:false});
    tray.appendChild(el);
  });
}

function handleDrop(cellIdx){
  if(dragPiece===null||boardState[cellIdx]!==null||gameOver) return;
  place(dragPiece,cellIdx);
}

function place(pid,cellIdx){
  const p=pieces[pid];
  if(p.placed||gameOver) return;
  p.placed=true;
  boardState[cellIdx]=pid;
  moves++; placedCount++;
  document.getElementById('moveCount').textContent=moves;
  document.getElementById('progressFill').style.width=`${(placedCount/(GRID*GRID))*100}%`;
  renderBoard();
  renderTray();
  if(placedCount===GRID*GRID) setTimeout(showWin,350);
}

function touchStart(e,pid){
  e.preventDefault();
  touchPiece=pid;
  const t=e.touches[0];
  const el=e.currentTarget;
  const r=el.getBoundingClientRect();
  touchClone=el.cloneNode(true);
  touchClone.style.cssText=`position:fixed;width:${r.width}px;height:${r.height}px;opacity:0.85;pointer-events:none;z-index:999;transform:scale(1.12);border:2px solid #f59e0b;box-shadow:0 6px 24px rgba(245,158,11,0.6);left:${t.clientX-r.width/2}px;top:${t.clientY-r.height/2}px;border-radius:5px;overflow:hidden;`;
  document.body.appendChild(touchClone);
}

function touchMove(e){
  e.preventDefault();
  if(!touchClone) return;
  const t=e.touches[0];
  const w=parseFloat(touchClone.style.width);
  const h=parseFloat(touchClone.style.height);
  touchClone.style.left=(t.clientX-w/2)+'px';
  touchClone.style.top=(t.clientY-h/2)+'px';
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('drag-over'));
  const under=document.elementFromPoint(t.clientX,t.clientY);
  const cell=under?.closest('.cell');
  if(cell&&boardState[parseInt(cell.dataset.idx)]===null) cell.classList.add('drag-over');
}

function touchEnd(e){
  e.preventDefault();
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('drag-over'));
  if(touchPiece===null) return;
  const t=e.changedTouches[0];
  const under=document.elementFromPoint(t.clientX,t.clientY);
  const cell=under?.closest('.cell');
  if(cell){
    const idx=parseInt(cell.dataset.idx);
    if(boardState[idx]===null) place(touchPiece,idx);
  }
  touchPiece=null;
}

function showWin(){
  clearInterval(timerInterval);
  gameOver=true;
  const elapsed=TOTAL_SECONDS-secondsLeft;
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('winStats').textContent=`${moves} hamle · ${m}:${String(s).padStart(2,'0')} sürede tamamladın!`;
  document.getElementById('winOverlay').classList.add('show');
}

function restartGame(){
  init();
}
</script>
